[project]
name = "db"
version = "0.1.0"
description = "Database integrations for scout"
requires-python = ">=3.13"
dependencies = [
    "psycopg[binary]>=3.2",
    "rag",
]

[tool.uv.sources]
rag = { workspace = true }

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

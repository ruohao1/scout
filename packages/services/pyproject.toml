[project]
name = "services"
version = "0.1.0"
description = "Application service orchestration for scout"
requires-python = ">=3.13"
dependencies = [
    "db",
    "langchain-core>=1",
    "langchain-google-genai>=3",
    "langgraph>=1",
    "pypdf>=6",
    "providers",
    "rag",
]

[tool.uv.sources]
db = { workspace = true }
providers = { workspace = true }
rag = { workspace = true }

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
